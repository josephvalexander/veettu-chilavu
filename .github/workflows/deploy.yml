name: Deploy FamilyLedger to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Allow writing to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Generate version strings ──────────────────────
      - name: Generate version and build time
        id: version
        run: |
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%MZ")

          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG}-${BUILD_TIME}"
          else
            VERSION="${SHORT_SHA}-${BUILD_TIME}"
          fi

          echo "version=${VERSION}"    >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}"
          echo "✅ Build time: ${BUILD_TIME}"

      # ── 3. Auto-detect app files and copy to dist/ ───────
      - name: Prepare dist folder
        run: |
          mkdir -p dist

          # Find index.html anywhere up to 2 levels deep
          if [ -f "index.html" ]; then
            APP_DIR="."
          else
            FOUND=$(find . -maxdepth 2 -name "index.html" ! -path "./.git/*" | head -1)
            if [ -z "$FOUND" ]; then
              echo "❌ Could not find index.html anywhere in the repo."
              exit 1
            fi
            APP_DIR=$(dirname "$FOUND")
          fi

          echo "✅ App files found in: ${APP_DIR}"

          # Required files
          cp "${APP_DIR}/index.html"   dist/
          cp "${APP_DIR}/sw.js"        dist/
          cp "${APP_DIR}/manifest.json" dist/

          # Copy favicon if present
          [ -f "${APP_DIR}/favicon.ico" ] && cp "${APP_DIR}/favicon.ico" dist/ || true
          # Copy icons folder if present, otherwise generate below
          [ -d "${APP_DIR}/icons" ] && cp -r "${APP_DIR}/icons" dist/ || true

      # ── 3b. Generate PWA icons (runs only if icons are missing) ──
      - name: Generate PWA icons
        run: |
          if [ ! -f "dist/icons/icon-192.png" ] || [ ! -f "dist/icons/icon-512.png" ]; then
            echo "⚙️  Generating PWA icons with Node.js..."
            mkdir -p dist/icons
            node -e "
              const fs=require('fs'),zlib=require('zlib');
              function png(size){
                const BG=[26,26,46],ACC=[245,200,66];
                const px=new Uint8Array(size*size*4);
                const pad=Math.floor(size*0.2);
                for(let y=0;y<size;y++) for(let x=0;x<size;x++){
                  const i=(y*size+x)*4;
                  const c=(x>=pad&&x<size-pad&&y>=pad&&y<size-pad)?ACC:BG;
                  px[i]=c[0];px[i+1]=c[1];px[i+2]=c[2];px[i+3]=255;
                }
                function crc(b){const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?0xEDB88320^(c>>>1):c>>>1;t[i]=c;}let c=0xFFFFFFFF;for(const b2 of b)c=t[(c^b2)&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
                function chunk(t,d){const tb=Buffer.from(t);const lb=Buffer.alloc(4);lb.writeUInt32BE(d.length);const cv=Buffer.alloc(4);cv.writeUInt32BE(crc(Buffer.concat([tb,d])));return Buffer.concat([lb,tb,d,cv]);}
                const hdr=Buffer.alloc(13);hdr.writeUInt32BE(size,0);hdr.writeUInt32BE(size,4);hdr[8]=8;hdr[9]=2;
                const rs=size*3;const rr=Buffer.alloc(size*(rs+1));
                for(let y=0;y<size;y++){rr[y*(rs+1)]=0;for(let x=0;x<size;x++){const s=(y*size+x)*4;const d2=y*(rs+1)+1+x*3;rr[d2]=px[s];rr[d2+1]=px[s+1];rr[d2+2]=px[s+2];}}
                const cmp=zlib.deflateSync(rr,{level:6});
                return Buffer.concat([Buffer.from([137,80,78,71,13,10,26,10]),chunk('IHDR',hdr),chunk('IDAT',cmp),chunk('IEND',Buffer.alloc(0))]);
              }
              fs.writeFileSync('dist/icons/icon-192.png',png(192));
              fs.writeFileSync('dist/icons/icon-512.png',png(512));
              fs.writeFileSync('dist/favicon.ico',png(32));
              console.log('Icons generated OK');
            "
          else
            echo "✅ Icons already present"
          fi
          # Copy favicon to dist root if not already there
          [ -f "dist/favicon.ico" ] || ([ -f "favicon.ico" ] && cp favicon.ico dist/) || true

      # ── 4. Inject Google Client ID ────────────────────────
      #    Add secret: repo → Settings → Secrets → Actions
      #    Secret name: GOOGLE_CLIENT_ID
      - name: Inject Google Client ID
        run: |
          CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          if [ -z "$CLIENT_ID" ]; then
            echo "⚠️  GOOGLE_CLIENT_ID secret not set — app will show setup modal"
            CLIENT_ID="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
          fi
          sed -i "s|__GOOGLE_CLIENT_ID__|${CLIENT_ID}|g" dist/index.html
          echo "✅ Client ID injected: ${CLIENT_ID:0:12}..."

      # ── 5. Inject Google Sheet ID ─────────────────────────
      #    Add secret: repo → Settings → Secrets → Actions
      #    Secret name: GOOGLE_SHEET_ID
      #    Value: the long ID from your Google Sheet URL
      #    e.g. https://docs.google.com/spreadsheets/d/[THIS PART]/edit
      - name: Inject Google Sheet ID
        run: |
          SHEET_ID="${{ secrets.GOOGLE_SHEET_ID }}"
          if [ -z "$SHEET_ID" ]; then
            echo "⚠️  GOOGLE_SHEET_ID secret not set — users will be asked to enter Sheet ID manually"
            SHEET_ID="__SHEET_ID_NOT_CONFIGURED__"
          fi
          sed -i "s|__GOOGLE_SHEET_ID__|${SHEET_ID}|g" dist/index.html
          echo "✅ Sheet ID injected: ${SHEET_ID:0:12}..."

      # ── 6. Inject SW version + build time ────────────────
      - name: Inject SW version and build time
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME="${{ steps.version.outputs.build_time }}"
          sed -i "s|__SW_VERSION__|${VERSION}|g"    dist/sw.js
          sed -i "s|__BUILD_TIME__|${BUILD_TIME}|g" dist/sw.js
          echo "✅ SW version injected: ${VERSION}"
          # Write version.json for update polling
          echo "{\"version\":\"${VERSION}\",\"buildTime\":\"${BUILD_TIME}\"}" > dist/version.json

      # ── 7. Verify build ───────────────────────────────────
      - name: Verify dist contents
        run: |
          echo "📦 Files in dist/:"
          ls -la dist/
          echo ""
          # Make sure no uninjected placeholders remain
          if grep -q "__GOOGLE_CLIENT_ID__\|__GOOGLE_SHEET_ID__\|__SW_VERSION__\|__BUILD_TIME__" dist/index.html dist/sw.js 2>/dev/null; then
            echo "⚠️  WARNING: Some placeholders were not replaced."
            echo "   Check that all GitHub Secrets are set correctly."
            grep -n "__GOOGLE_CLIENT_ID__\|__GOOGLE_SHEET_ID__\|__SW_VERSION__\|__BUILD_TIME__" dist/index.html dist/sw.js || true
          else
            echo "✅ All placeholders successfully replaced"
          fi

      # ── 8. Upload to GitHub Pages ─────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      # ── 9. Deploy ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: echo "🚀 Deployed to ${{ steps.deployment.outputs.page_url }}"
