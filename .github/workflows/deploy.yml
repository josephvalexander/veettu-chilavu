# .github/workflows/deploy.yml
# Deploys Bodhanika to GitHub Pages on every push to main.
# Bumps SW version so all PWA clients auto-update.

name: Deploy Bodhanika

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump service worker version
        run: |
          VERSION="v$(date +'%Y.%m.%d.%H%M')"
          echo "Deploying version: $VERSION"
          sed -i "s/const VERSION = '[^']*'/const VERSION = '$VERSION'/" sw.js
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit updated sw.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: deploy ${{ env.VERSION }}"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
