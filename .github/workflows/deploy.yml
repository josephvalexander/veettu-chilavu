name: Deploy FamilyLedger to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Allow writing to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Generate version strings ──────────────────────
      - name: Generate version and build time
        id: version
        run: |
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%MZ")

          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG}-${BUILD_TIME}"
          else
            VERSION="${SHORT_SHA}-${BUILD_TIME}"
          fi

          echo "version=${VERSION}"    >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}"
          echo "✅ Build time: ${BUILD_TIME}"

      # ── 3. Auto-detect app files and copy to dist/ ───────
      - name: Prepare dist folder
        run: |
          mkdir -p dist

          # Find index.html anywhere up to 2 levels deep
          if [ -f "index.html" ]; then
            APP_DIR="."
          else
            FOUND=$(find . -maxdepth 2 -name "index.html" ! -path "./.git/*" | head -1)
            if [ -z "$FOUND" ]; then
              echo "❌ Could not find index.html anywhere in the repo."
              exit 1
            fi
            APP_DIR=$(dirname "$FOUND")
          fi

          echo "✅ App files found in: ${APP_DIR}"

          # Required files
          cp "${APP_DIR}/index.html"   dist/
          cp "${APP_DIR}/sw.js"        dist/
          cp "${APP_DIR}/manifest.json" dist/

          # Copy favicon if present
          [ -f "${APP_DIR}/favicon.ico" ] && cp "${APP_DIR}/favicon.ico" dist/ || true
          # Copy icons folder if present, otherwise generate below
          [ -d "${APP_DIR}/icons" ] && cp -r "${APP_DIR}/icons" dist/ || true

      # ── 3b. Generate all PWA icons using Python/Pillow ───────────
      - name: Generate PWA icons
        run: |
          pip install Pillow --quiet
          mkdir -p dist/icons
          python3 - << 'PYEOF'
from PIL import Image, ImageDraw
import os

BG=(24,16,20); PAPER=(44,28,38); PAPER_L=(54,38,48)
CORAL=(232,114,90); GOLD=(245,200,66); MUTED=(120,110,130); TEAL=(95,196,184)

def make_icon(size):
    img=Image.new("RGBA",(size,size),(0,0,0,0))
    draw=ImageDraw.Draw(img)
    pad=max(2,int(size*0.045)); cr=int(size*0.22)
    draw.rounded_rectangle([pad,pad,size-pad,size-pad],radius=cr,fill=BG)
    rx1,rx2=int(size*0.28),int(size*0.72); ry1=int(size*0.16)
    zy=int(size*0.82); zn=8; zh=int(size*0.035); zs=(rx2-rx1)/zn
    pts=[(rx1,ry1),(rx2,ry1),(rx2,zy)]
    for i in range(zn):
        x=rx2-i*zs; pts.append((x,zy)); pts.append((x-zs/2,zy+zh))
    pts.append((rx1,zy))
    draw.polygon(pts,fill=PAPER)
    draw.rounded_rectangle([rx1+2,ry1+2,rx2-2,zy-2],radius=max(1,int(size*0.015)),fill=PAPER_L)
    lx1=rx1+int(size*0.06); lx2=rx2-int(size*0.06); ax=rx2-int(size*0.07)
    lh=int(size*0.055); lr=max(1,int(size*0.018))
    draw.rounded_rectangle([lx1,ry1+int(size*0.055),lx2,ry1+int(size*0.055)+lh],radius=lr,fill=(*CORAL,200))
    rows=[(int(size*0.14),(*MUTED,140),(*GOLD,220)),(int(size*0.10),(*MUTED,110),(*GOLD,200)),(int(size*0.12),(*MUTED,130),(*GOLD,210)),(int(size*0.09),(*MUTED,100),(*GOLD,190))]
    sy=ry1+int(size*0.15)
    for i,(dw,dc,ac) in enumerate(rows):
        y=sy+i*int(size*0.115); lt=max(2,int(size*0.028))
        draw.rounded_rectangle([lx1,y,lx1+dw,y+lt],radius=lt//2,fill=dc)
        aw=int(size*0.09)
        draw.rounded_rectangle([ax-aw,y,ax,y+lt],radius=lt//2,fill=ac)
    dy=sy+4*int(size*0.115)+int(size*0.015)
    draw.rounded_rectangle([lx1,dy,lx2,dy+max(1,int(size*0.012))],radius=1,fill=(*MUTED,60))
    ty=dy+int(size*0.03); th=max(3,int(size*0.038)); tw=int(size*0.11)
    draw.rounded_rectangle([lx1,ty,lx1+tw,ty+th],radius=th//2,fill=(*TEAL,230))
    aw2=int(size*0.12)
    draw.rounded_rectangle([ax-aw2,ty-int(size*0.005),ax,ty+th+int(size*0.005)],radius=th//2,fill=GOLD)
    bx=rx2+int(size*0.04); by=ry1-int(size*0.04); bs=int(size*0.18)
    bolt=[(bx+bs*0.18,by-bs*0.5),(bx-bs*0.05,by+bs*0.05),(bx+bs*0.12,by+bs*0.05),(bx-bs*0.18,by+bs*0.5),(bx+bs*0.02,by),(bx-bs*0.1,by)]
    draw.polygon(bolt,fill=GOLD)
    draw.ellipse([bx+bs*0.12-size*0.025,by-bs*0.5-size*0.025,bx+bs*0.12+size*0.025,by-bs*0.5+size*0.025],fill=CORAL)
    draw.rounded_rectangle([pad,pad,size-pad,size-pad],radius=cr,outline=(*CORAL,45),width=max(1,int(size*0.013)))
    return img

for sz in [16,32,48,64,128,192,512]:
    make_icon(sz).save(f"dist/icons/icon-{sz}.png")
    print(f"Generated icon-{sz}.png")

imgs=[make_icon(s) for s in [16,32,48]]
imgs[0].save("dist/favicon.ico",format="ICO",sizes=[(16,16),(32,32),(48,48)],append_images=imgs[1:])
make_icon(32).save("dist/icons/favicon.png")
make_icon(32).save("dist/favicon.png")
print("All icons generated")
PYEOF
          echo "✅ PWA icons generated"

      # ── 4. Inject Google Client ID ────────────────────────
      #    Add secret: repo → Settings → Secrets → Actions
      #    Secret name: GOOGLE_CLIENT_ID
      - name: Inject Google Client ID
        run: |
          CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          if [ -z "$CLIENT_ID" ]; then
            echo "⚠️  GOOGLE_CLIENT_ID secret not set — app will show setup modal"
            CLIENT_ID="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
          fi
          sed -i "s|__GOOGLE_CLIENT_ID__|${CLIENT_ID}|g" dist/index.html
          echo "✅ Client ID injected: ${CLIENT_ID:0:12}..."

      # ── 5. Inject Google Sheet ID ─────────────────────────
      #    Add secret: repo → Settings → Secrets → Actions
      #    Secret name: GOOGLE_SHEET_ID
      #    Value: the long ID from your Google Sheet URL
      #    e.g. https://docs.google.com/spreadsheets/d/[THIS PART]/edit
      - name: Inject Google Sheet ID
        run: |
          SHEET_ID="${{ secrets.GOOGLE_SHEET_ID }}"
          if [ -z "$SHEET_ID" ]; then
            echo "⚠️  GOOGLE_SHEET_ID secret not set — users will be asked to enter Sheet ID manually"
            SHEET_ID="__SHEET_ID_NOT_CONFIGURED__"
          fi
          sed -i "s|__GOOGLE_SHEET_ID__|${SHEET_ID}|g" dist/index.html
          echo "✅ Sheet ID injected: ${SHEET_ID:0:12}..."

      # ── 6. Inject SW version + build time ────────────────
      - name: Inject SW version and build time
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME="${{ steps.version.outputs.build_time }}"
          sed -i "s|__SW_VERSION__|${VERSION}|g"    dist/sw.js
          sed -i "s|__BUILD_TIME__|${BUILD_TIME}|g" dist/sw.js
          echo "✅ SW version injected: ${VERSION}"
          # Write version.json for update polling
          echo "{\"version\":\"${VERSION}\",\"buildTime\":\"${BUILD_TIME}\"}" > dist/version.json

      # ── 7. Verify build ───────────────────────────────────
      - name: Verify dist contents
        run: |
          echo "📦 Files in dist/:"
          ls -la dist/
          echo ""
          # Make sure no uninjected placeholders remain
          if grep -q "__GOOGLE_CLIENT_ID__\|__GOOGLE_SHEET_ID__\|__SW_VERSION__\|__BUILD_TIME__" dist/index.html dist/sw.js 2>/dev/null; then
            echo "⚠️  WARNING: Some placeholders were not replaced."
            echo "   Check that all GitHub Secrets are set correctly."
            grep -n "__GOOGLE_CLIENT_ID__\|__GOOGLE_SHEET_ID__\|__SW_VERSION__\|__BUILD_TIME__" dist/index.html dist/sw.js || true
          else
            echo "✅ All placeholders successfully replaced"
          fi

      # ── 8. Upload to GitHub Pages ─────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      # ── 9. Deploy ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: echo "🚀 Deployed to ${{ steps.deployment.outputs.page_url }}"
